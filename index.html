<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Task Manager</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header Section -->
    <header>
        <h1>Student Task Manager</h1>
        <p>Organize your study tasks and track your progress.</p>
    </header>


    <main>

        <!-- Add Task Section -->
        <section class="task-form">

            <h2>Add New Task</h2>

            <input
                type="text"
                id="taskName"
                placeholder="Enter task name"
            >

            <input
                type="text"
                id="subject"
                placeholder="Enter subject"
            >

            <input
                type="date"
                id="deadline"
            >

            <select id="priority">

                <option value="Low">
                    Low Priority
                </option>

                <option value="Medium">
                    Medium Priority
                </option>

                <option value="High">
                    High Priority
                </option>

            </select>

            <button id="addTaskBtn">
                Add Task
            </button>

            <button id="cancelEditBtn" class="cancel-edit-btn">
                Cancel Edit
            </button>

        </section>


        <!-- Task List Section -->
        <section class="task-section">

            <h2>My Tasks</h2>


            <!-- Filter Buttons -->

            <div class="filters">

                <button
                    id="allBtn"
                    class="active-filter"
                    onclick="filterTasks('all')"
                >
                    All
                </button>


                <button
                    id="pendingBtn"
                    onclick="filterTasks('pending')"
                >
                    Pending
                </button>


                <button
                    id="completedBtn"
                    onclick="filterTasks('completed')"
                >
                    Completed
                </button>

            </div>


            <!-- Tasks will be dynamically inserted here -->

            <div id="taskList">

                <!-- Tasks appear here using JavaScript -->

            </div>

        </section>


        <!-- Statistics Section -->

        <section class="statistics">

            <h2>Task Statistics</h2>

            <p>
                Total Tasks:
                <span id="totalTasks">0</span>
            </p>

            <p>
                Completed Tasks:
                <span id="completedTasks">0</span>
            </p>

            <p>
                Pending Tasks:
                <span id="pendingTasks">0</span>
            </p>

        </section>

    </main>


    <!-- JavaScript File -->

    <script src="script.js"></script>

</body>

</html>
